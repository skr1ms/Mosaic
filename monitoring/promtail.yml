server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(mosaic_backend_dev|mosaic_frontend_dev|mosaic_postgres_dev|mosaic_redis_dev)"
        target_label: __tmp_docker_container_name
      - source_labels: ["__tmp_docker_container_name"]
        regex: ""
        action: drop
      - source_labels: ["__meta_docker_container_name"]
        regex: "/mosaic_backend_dev"
        target_label: job
        replacement: "mosaic-backend"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/mosaic_frontend_dev"
        target_label: job
        replacement: "mosaic-frontend"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/mosaic_postgres_dev"
        target_label: job
        replacement: "postgres"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/mosaic_redis_dev"
        target_label: job
        replacement: "redis"
      - source_labels: ["job"]
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container_name
        replacement: "${1}"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
    pipeline_stages:
      - match:
          selector: '{job="mosaic-backend"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\d{1,2}:\d{2}[AP]M)\s+(?P<level>\w+)\s+(?P<caller>\S+)\s+>\s+(?P<message>.*)$'
            - labels:
                level:
                caller:
            - timestamp:
                source: timestamp
                format: "3:04PM"
                location: "Local"
      - match:
          selector: '{job!="mosaic-backend"}'
          stages:
            - output:
                source: message

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log
    pipeline_stages:
      - match:
          selector: '{job="varlogs"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\S+\s+\S+\s+\S+)\s+(?P<hostname>\S+)\s+(?P<service>\S+):\s+(?P<message>.*)$'
            - labels:
                hostname:
                service:
            - timestamp:
                source: timestamp
                format: Jan 02 15:04:05
