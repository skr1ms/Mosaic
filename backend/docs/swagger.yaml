definitions:
  admin.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    required:
    - current_password
    - new_password
    type: object
  admin.CreateAdminRequest:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  auth.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  auth.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  coupon.ActivateCouponRequest:
    properties:
      original_image_url:
        type: string
      preview_url:
        type: string
      schema_url:
        type: string
    type: object
  coupon.CouponSize:
    enum:
    - 21x30
    - 30x40
    - 40x40
    - 40x50
    - 40x60
    - 50x70
    type: string
    x-enum-varnames:
    - Size21x30
    - Size30x40
    - Size40x40
    - Size40x50
    - Size40x60
    - Size50x70
  coupon.CouponStyle:
    enum:
    - grayscale
    - skin_tones
    - pop_art
    - max_colors
    type: string
    x-enum-varnames:
    - StyleGrayscale
    - StyleSkinTones
    - StylePopArt
    - StyleMaxColors
  coupon.CreateCouponRequest:
    properties:
      count:
        maximum: 1000
        minimum: 1
        type: integer
      partner_id:
        type: string
      size:
        allOf:
        - $ref: '#/definitions/coupon.CouponSize'
        enum:
        - 21x30
        - 30x40
        - 40x40
        - 40x50
        - 40x60
        - 50x70
      style:
        allOf:
        - $ref: '#/definitions/coupon.CouponStyle'
        enum:
        - grayscale
        - skin_tones
        - pop_art
        - max_colors
    required:
    - count
    - partner_id
    - size
    - style
    type: object
  coupon.MarkAsPurchasedRequest:
    properties:
      purchase_email:
        type: string
    required:
    - purchase_email
    type: object
  coupon.SendSchemaRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  image.AddToQueueRequest:
    properties:
      coupon_id:
        type: string
      original_image_path:
        type: string
      priority:
        maximum: 10
        minimum: 1
        type: integer
      processing_params:
        $ref: '#/definitions/image.ProcessingParams'
      user_email:
        type: string
    required:
    - coupon_id
    - original_image_path
    - processing_params
    - user_email
    type: object
  image.FailProcessingRequest:
    properties:
      error_message:
        maxLength: 500
        minLength: 1
        type: string
    required:
    - error_message
    type: object
  image.ProcessingParams:
    properties:
      settings:
        additionalProperties: true
        type: object
      style:
        enum:
        - grayscale
        - skin_tones
        - pop_art
        - max_colors
        type: string
    required:
    - settings
    - style
    type: object
  partner.CreatePartnerRequest:
    properties:
      address:
        type: string
      allow_purchases:
        type: boolean
      allow_sales:
        type: boolean
      brand_name:
        type: string
      domain:
        type: string
      email:
        type: string
      login:
        type: string
      logo_url:
        type: string
      ozon_link:
        type: string
      partner_code:
        type: string
      password:
        type: string
      phone:
        type: string
      status:
        enum:
        - active
        - blocked
        type: string
      telegram:
        type: string
      telegram_link:
        type: string
      whatsapp:
        type: string
      whatsapp_link:
        type: string
      wildberries_link:
        type: string
    required:
    - address
    - brand_name
    - domain
    - email
    - login
    - logo_url
    - ozon_link
    - partner_code
    - password
    - phone
    - telegram
    - telegram_link
    - whatsapp
    - whatsapp_link
    - wildberries_link
    type: object
  partner.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  partner.ResetPasswordRequest:
    properties:
      new_password:
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  partner.UpdatePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    required:
    - current_password
    - new_password
    type: object
  payment.AvailableOptionsResponse:
    properties:
      sizes:
        items:
          $ref: '#/definitions/payment.SizeOption'
        type: array
      styles:
        items:
          $ref: '#/definitions/payment.StyleOption'
        type: array
    type: object
  payment.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  payment.OrderStatusResponse:
    properties:
      amount:
        type: number
      coupon_code:
        description: Код купона после успешной оплаты
        type: string
      currency:
        type: string
      message:
        type: string
      order_id:
        type: string
      size:
        type: string
      status:
        type: string
      style:
        type: string
      success:
        type: boolean
    type: object
  payment.PaymentNotificationRequest:
    properties:
      actionCode:
        type: integer
      actionCodeDescription:
        type: string
      amount:
        type: integer
      checksum:
        description: Дополнительные поля для валидации
        type: string
      currency:
        type: string
      date:
        type: integer
      ip:
        type: string
      orderDescription:
        type: string
      orderId:
        type: string
      orderNumber:
        type: string
      orderStatus:
        type: integer
    type: object
  payment.PurchaseCouponRequest:
    properties:
      domain:
        description: Домен партнера для White Label
        type: string
      email:
        type: string
      fail_url:
        type: string
      language:
        enum:
        - ru
        - en
        - es
        type: string
      return_url:
        type: string
      size:
        enum:
        - 21x30
        - 30x40
        - 40x40
        - 40x50
        - 40x60
        - 50x70
        type: string
      style:
        enum:
        - grayscale
        - skin_tone
        - pop_art
        - max_colors
        type: string
    required:
    - email
    - return_url
    - size
    - style
    type: object
  payment.PurchaseCouponResponse:
    properties:
      message:
        type: string
      order_id:
        type: string
      payment_url:
        type: string
      success:
        type: boolean
    type: object
  payment.SizeOption:
    properties:
      description:
        type: string
      label:
        type: string
      price:
        description: Цена в рублях
        type: number
      value:
        type: string
    type: object
  payment.StyleOption:
    properties:
      description:
        type: string
      label:
        type: string
      value:
        type: string
    type: object
  payment.SuccessResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  public.ActivateCouponRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  public.PurchaseCouponRequest:
    properties:
      email:
        type: string
      payment_token:
        description: Токен оплаты
        type: string
      size:
        enum:
        - 21x30
        - 30x40
        - 40x40
        - 40x50
        - 40x60
        - 50x70
        type: string
      style:
        enum:
        - grayscale
        - skin_tones
        - pop_art
        - max_colors
        type: string
    required:
    - email
    - payment_token
    - size
    - style
    type: object
  public.SendEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  stats.CouponsBySizeResponse:
    properties:
      size_21x30:
        type: integer
      size_30x40:
        type: integer
      size_40x40:
        type: integer
      size_40x50:
        type: integer
      size_40x60:
        type: integer
      size_50x70:
        type: integer
    type: object
  stats.CouponsByStatusResponse:
    properties:
      activated:
        type: integer
      completed:
        type: integer
      new:
        type: integer
      used:
        type: integer
    type: object
  stats.CouponsByStyleResponse:
    properties:
      grayscale:
        type: integer
      max_colors:
        type: integer
      pop_art:
        type: integer
      skin_tones:
        type: integer
    type: object
  stats.GeneralStatsResponse:
    properties:
      activation_rate:
        type: number
      active_partners_count:
        type: integer
      last_updated:
        type: string
      total_coupons_activated:
        type: integer
      total_coupons_created:
        type: integer
      total_partners_count:
        type: integer
    type: object
  stats.PartnerListStatsResponse:
    properties:
      partners:
        items:
          $ref: '#/definitions/stats.PartnerStatsResponse'
        type: array
      total:
        type: integer
    type: object
  stats.PartnerStatsResponse:
    properties:
      activated_coupons:
        type: integer
      activation_rate:
        type: number
      branded_site_purchases:
        type: integer
      last_activity:
        type: string
      partner_id:
        type: string
      partner_name:
        type: string
      total_coupons:
        type: integer
      unused_coupons:
        type: integer
    type: object
  stats.SystemHealthResponse:
    properties:
      average_processing_time:
        type: number
      database_status:
        type: string
      error_rate:
        type: number
      image_processing_queue:
        type: integer
      last_updated:
        type: string
      redis_status:
        type: string
      status:
        description: healthy, warning, critical
        type: string
      uptime:
        type: string
    type: object
  stats.TimeSeriesStatsPoint:
    properties:
      coupons_activated:
        type: integer
      coupons_created:
        type: integer
      coupons_purchased:
        type: integer
      date:
        type: string
      new_partners_count:
        type: integer
    type: object
  stats.TimeSeriesStatsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/stats.TimeSeriesStatsPoint'
        type: array
      period:
        type: string
    type: object
  stats.TopPartnerItem:
    properties:
      activated_coupons:
        type: integer
      activation_rate:
        type: number
      partner_id:
        type: string
      partner_name:
        type: string
      total_coupons:
        type: integer
    type: object
  stats.TopPartnersResponse:
    properties:
      partners:
        items:
          $ref: '#/definitions/stats.TopPartnerItem'
        type: array
    type: object
  types.EditImageRequest:
    properties:
      crop_height:
        description: Высота области кадрирования
        type: integer
      crop_width:
        description: Ширина области кадрирования
        type: integer
      crop_x:
        description: X координата начала кадрирования
        type: integer
      crop_y:
        description: Y координата начала кадрирования
        type: integer
      rotation:
        description: Поворот в градусах (0, 90, 180, 270)
        type: integer
      scale:
        description: Масштаб (0.1 - 5.0)
        type: number
    type: object
  types.GenerateSchemaRequest:
    properties:
      confirmed:
        description: Подтверждение создания схемы
        type: boolean
    required:
    - confirmed
    type: object
  types.ProcessImageRequest:
    properties:
      brightness:
        description: -100 до 100
        type: number
      contrast:
        description: low, high
        type: string
      lighting:
        description: sun, moon, venus
        type: string
      saturation:
        description: -100 до 100
        type: number
      settings:
        additionalProperties: true
        description: Дополнительные настройки
        type: object
      style:
        enum:
        - grayscale
        - skin_tones
        - pop_art
        - max_colors
        type: string
      use_ai:
        description: Использовать AI обработку
        type: boolean
    required:
    - style
    type: object
info:
  contact: {}
paths:
  /admin/admins:
    get:
      description: Возвращает список всех администраторов
      produces:
      - application/json
      responses:
        "200":
          description: Список администраторов
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Список администраторов
      tags:
      - admin-management
    post:
      consumes:
      - application/json
      description: Создает нового администратора (только для существующих администраторов)
      parameters:
      - description: Данные нового администратора
        in: body
        name: admin
        required: true
        schema:
          $ref: '#/definitions/admin.CreateAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Администратор создан
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Ошибка в запросе
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Создание администратора
      tags:
      - admin-management
  /admin/coupons:
    get:
      description: Возвращает список всех купонов с возможностью фильтрации
      parameters:
      - description: Поиск по номеру купона
        in: query
        name: search
        type: string
      - description: ID партнера для фильтрации
        in: query
        name: partner_id
        type: string
      - description: Статус для фильтрации (new/used)
        in: query
        name: status
        type: string
      - description: Размер для фильтрации
        in: query
        name: size
        type: string
      - description: Стиль для фильтрации
        in: query
        name: style
        type: string
      - description: Количество записей на странице (по умолчанию 50)
        in: query
        name: limit
        type: integer
      - description: Смещение для пагинации (по умолчанию 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список купонов
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Список купонов
      tags:
      - admin-coupons
    post:
      consumes:
      - application/json
      description: Создает новые купоны в пакетном режиме
      parameters:
      - description: Параметры создания купонов
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/coupon.CreateCouponRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Купоны созданы
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Ошибка в запросе
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Создание купонов
      tags:
      - admin-coupons
  /admin/coupons/{id}:
    delete:
      description: Удаляет купон по ID с подтверждением
      parameters:
      - description: ID купона
        in: path
        name: id
        required: true
        type: string
      - description: Подтверждение удаления (true/false)
        in: query
        name: confirm
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Купон удален
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный ID или требуется подтверждение
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Купон не найден
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Удаление купона
      tags:
      - admin-coupons
    get:
      description: Возвращает детальную информацию о купоне по ID
      parameters:
      - description: ID купона
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Информация о купоне
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Купон не найден
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Детальная информация о купоне
      tags:
      - admin-coupons
  /admin/coupons/{id}/reset:
    patch:
      description: Сбрасывает купон в статус "новый" с удалением всех данных активации
      parameters:
      - description: ID купона
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Купон сброшен
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Купон не найден
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Сброс купона
      tags:
      - admin-coupons
  /admin/coupons/batch-delete:
    post:
      consumes:
      - application/json
      description: Удаляет множество купонов по их ID в административной панели
      parameters:
      - description: Список ID купонов для удаления
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Результат массового удаления
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Ошибка в запросе
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Массовое удаление купонов для админа
      tags:
      - admin-coupons
  /admin/coupons/export:
    get:
      description: Экспортирует список купонов в файл (поддерживаются форматы txt
        и csv)
      parameters:
      - default: txt
        description: Формат экспорта (txt или csv)
        in: query
        name: format
        type: string
      - description: Имя файла (без расширения)
        in: query
        name: filename
        type: string
      - description: ID партнера для фильтрации
        in: query
        name: partner_id
        type: string
      - description: Статус для фильтрации (new/used)
        in: query
        name: status
        type: string
      - description: Размер для фильтрации
        in: query
        name: size
        type: string
      - description: Стиль для фильтрации
        in: query
        name: style
        type: string
      produces:
      - text/plain
      - text/csv
      responses:
        "200":
          description: Файл с купонами
          schema:
            type: string
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Экспорт купонов
      tags:
      - admin-coupons
  /admin/coupons/export/partner/{id}:
    get:
      description: Экспортирует купоны конкретного партнера со статусом "new" в формате
        .txt или .csv
      parameters:
      - description: ID партнера
        in: path
        name: id
        required: true
        type: string
      - default: txt
        description: Формат файла (txt или csv)
        in: query
        name: format
        type: string
      produces:
      - text/plain
      - text/csv
      responses:
        "200":
          description: Файл с купонами партнера
          schema:
            type: string
        "400":
          description: Неверный ID партнера
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Не авторизован
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Партнер не найден
