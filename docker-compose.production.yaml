services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: photo-doyoupaint-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Для продакшена раскомментируйте и настройте SSL сертификаты
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
      - ./logs/nginx:/var/log/nginx
    environment:
      - NODE_ENV=production
    networks:
      - photo-network

networks:
  photo-network:
    driver: bridge
