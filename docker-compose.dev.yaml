services:
  postgres:
    image: postgres:17-alpine
    container_name: mosaic_postgres_dev
    environment:
      POSTGRES_DB: mosaic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 53849462s
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: mosaic_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: mosaic_prometheus_dev
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_dev_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: mosaic_grafana_dev
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - grafana_dev_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    container_name: mosaic_loki_dev
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml
      - loki_dev_data:/loki
    command: 
      - "-config.file=/etc/loki/local-config.yaml"

  promtail:
    image: grafana/promtail:latest
    container_name: mosaic_promtail_dev
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - ./backend/logs:/app/logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: 
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mosaic_backend_dev
    environment:
      - DB_URL=postgres://postgres:53849462s@postgres:5432/mosaic?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - METRICS_PORT=8091
    ports:
      - "8080:8080"
      - "8091:8091"  # Метрики Prometheus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/.env:/app/.env
      - ./backend/logs:/app/logs

volumes:
  postgres_dev_data:
  redis_dev_data:
  prometheus_dev_data:
  grafana_dev_data:
  loki_dev_data: